<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Martínez & Asociados</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Raleway', sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 600px; }
    .logo-icon {
      width: 80px; height: 80px;
      background: linear-gradient(145deg, #FFD000, #F5A623, #D4891A);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: #1a0a00;
      font-weight: 900;
      margin: 0 auto 32px;
      box-shadow: 4px 4px 0 #7C400C, 8px 8px 16px rgba(0,0,0,0.8);
    }
    .num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 20vw, 180px);
      color: #F5A623;
      line-height: 1;
      letter-spacing: 4px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(24px, 5vw, 40px);
      color: #fff;
      letter-spacing: 2px;
      margin: 16px 0;
    }
    p {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 36px;
      background: #F5A623;
      color: #0A0A0A;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 4px;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #D4891A;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-icon">M&amp;A</div>
    <div class="num">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o fue movida.<br>Regresa al inicio y encuentra todo lo que necesitas.</p>
    <a href="index.html" class="btn">← Volver al inicio</a>
  </div>
</body>
</html>
